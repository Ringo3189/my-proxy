<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・プロキシ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; }
        h1 { color: #333; }
        input { width: 300px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>マイ・プロキシ</h1>
    <p>見たいサイトのURLを入力してね</p>
    <form action="/proxy" method="GET">
        <input type="text" name="url" placeholder="https://example.com" required>
        <button type="submit">開く</button>
    </form>
</body>
</html>
